name: Build and Sync Resume

on:
  push:
    paths:
      - 'resume/**' 
  workflow_dispatch: 

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          working_directory: resume
          # Adding args to ensure it cleans up temp files
          args: "-pdf -interaction=nonstopmode -halt-on-error"

      - name: Sync PDF and Overwrite
        run: |
          # If the PDF was built in the root, move it to resume/ (overwriting)
          # If it's already in resume/, this just ensures it's ready for commit
          if [ -f "resume.pdf" ]; then
            mv -f resume.pdf resume/resume.pdf
          fi

      - name: Commit PDF back to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-generate resume.pdf [skip ci]"
          file_pattern: resume/resume.pdf
          push_options: '--force'